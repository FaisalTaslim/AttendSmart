" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M611,158.2038 L611,168.2038 L621,168.2038 L611,158.2038 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="312" x="266" y="178.1697">Global Error Handling (wraps entire process):</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="239" x="266" y="197.2376">Any thrown error from earlier steps</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="260" x="266" y="216.3055">(missing history, missing schedule, DB</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="185" x="266" y="235.3734">failure, etc.) is caught here.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="172" x="266" y="254.4414">Logged server-side, then:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="340" x="266" y="273.5093">Return 500 {success: false, message: err.message}</text><ellipse cx="229" cy="220.4075" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1.0;"/><ellipse cx="229" cy="220.4075" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:2.0;" x1="229" x2="229" y1="70.0679" y2="90.0679"/><polygon fill="#181818" points="225,80.0679,229,90.0679,233,80.0679,229,84.0679" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:2.0;" x1="229" x2="229" y1="148.2038" y2="209.4075"/><polygon fill="#181818" points="225,199.4075,229,209.4075,233,199.4075,229,203.4075" style="stroke:#181818;stroke-width:1.0;"/><!--SRC=[LP1FJy904CNl-oacdY1Hh4GlbP20Y1uyeKSlotRQRjZkDZDJI3LyTwU4ADxcpzktltcyyx6rP1jOOMcx8EiKvTr_8TpT6_vTBeZIuQFsRXUH6QQNAoT-xwLV9YgGBZNY9I3CjlErZpR01hbDaH5iBE1P